name: aibro
description: AI-assisted brainstorming tool with multi-platform support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  
  # HTTP & WebSockets
  http: ^1.1.2
  web_socket_channel: ^2.4.0
  dio: ^5.4.0
  stomp_dart_client: ^3.0.1
  
  # Audio Recording & Playback
  record: ^6.2.0
  audioplayers: ^5.2.1
  permission_handler: ^11.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # File Handling
  file_picker: ^6.1.1
  path: ^1.8.3
  open_filex: ^4.4.0
  share_plus: ^7.2.1
  url_launcher: ^6.3.0
  
  # PDF Generation for Reports
  pdf: ^3.10.7
  printing: ^5.11.1
  
  # Date & Time
  intl: ^0.18.1
  package_info_plus: ^8.0.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Animations
  lottie: ^2.7.0
  flutter_animate: ^4.3.0

  # Text-to-Speech for vocal prompts
  flutter_tts: ^3.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/

  # Add custom fonts here once the files exist under assets/fonts/
  # fonts:
  #   - family: CustomIcons
  #     fonts:
  #       - asset: assets/fonts/CustomIcons.ttf

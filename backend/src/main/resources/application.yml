server:
  port: 8080
  compression:
    enabled: true

spring:
  application:
    name: aibro-backend

  datasource:
    url: jdbc:h2:mem:aibrodb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# WebSocket Configuration
websocket:
  allowed-origins: "*"
  endpoint: /ws
  topic-prefix: /topic
  app-prefix: /app

# AI Configuration
ai:
  models:
    claude:
      api-url: https://api.anthropic.com/v1
      model-name: claude-sonnet-4-20250514
    openai:
      api-url: https://api.openai.com/v1
      model-name: gpt-4-turbo-preview
    gemini:
      api-url: https://generativelanguage.googleapis.com/v1beta
      model-name: gemini-2.0-flash-exp

## Legacy speech/logging config (replaced below) removed

# Audio Processing
audio:
  sample-rate: 16000
  channels: 1
  encoding: LINEAR16
  max-duration-minutes: 120

contribution:
  default-frequency: 5
  min-frequency: 1
  max-frequency: 20

# Speech Services
speech:
  recognition:
    provider: google-cloud # Options: google-cloud, azure, aws
    language: en-US
  text-to-speech:
    provider: google-cloud
    voices:
      male: en-US-Neural2-D
      female: en-US-Neural2-F

# Logging
logging:
  level:
    root: INFO
    com.aibro: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/aibro.log
    max-size: 10MB
    max-history: 30

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

